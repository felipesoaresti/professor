apiVersion: v1
kind: Pod
metadata:
  name: app-com-init
  namespace: estudo
spec:
  initContainers:
    - name: wait-for-db # aguarda o banco estar disponível
      image: busybox:1.36
      command:
        [
          "sh",
          "-c",
          "until nc -z postgres-svc.databases.svc.cluster.local 5432; do echo
            aguardando DB...; sleep 5; done",
        ]

    - name: run-migrations # executa migrations antes da app subir
      image: minha-app:latest
      command: [ "python", "manage.py", "migrate" ]
      env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: url

  containers:
    - name: app # sobe apenas após os dois init containers terminarem
      image: minha-app:latest
      command: [ "python", "manage.py", "runserver" ]
